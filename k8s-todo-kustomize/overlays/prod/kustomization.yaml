apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # baseを参照する
  - ../../base
# baseのリソースに対してパッチを適用する
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: todo-api
    spec:
      # 本番環境では3レプリカで可用性を確保
      replicas: 3
      template:
        spec:
          containers:
            - name: todo-api
              resources:
                requests:
                  # 本番環境ではリソースを多めに確保
                  cpu: "200m"
                  memory: "256Mi"
                limits:
                  cpu: "1000m"
                  memory: "512Mi"
  target:
    kind: Deployment
    name: todo-api
- patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: todo-frontend
      spec:
        replicas: 3
  target:
    kind: Deployment
    name: todo-frontend
