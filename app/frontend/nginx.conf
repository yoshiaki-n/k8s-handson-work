server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend の静的ファイル
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API へのリバースプロキシ
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ヘルスチェック用プロキシ
    location /healthz {
        proxy_pass http://api:8080;
    }
}
