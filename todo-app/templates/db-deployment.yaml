apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # Deployment　の Volumes　でこのPVCを参照する
  name: {{.Release.Name}}-db-pvc
spec:
  accessModes:
    # 同時に１つのNodeのみ読み書き可能（DBに適切なモード）
    - ReadWriteOnce
  resources:
    requests:
      # 1Gibのストレージを要求する
      storage: {{.Values.db.storage.size}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Release.Name}}-db
  labels:
    app: {{.Release.Name}}-db
spec:
  # DBはシングルインスタンス
  replicas: {{.Values.db.replicas}}
  selector:
    matchLabels:
      app: {{.Release.Name}}-db
  template:
    metadata:
      labels:
        app: {{.Release.Name}}-db
    spec:
      containers:
        - name: todo-db
          image: {{.Values.db.image.repository}}:{{.Values.db.image.tag}}
          ports:
            - containerPort: {{.Values.db.service.port}}
          env:
            - name: POSTGRES_DB
              value: "{{.Values.db.credentials.database}}"
            - name: POSTGRES_USER
              value: "{{.Values.db.credentials.username}}"
            - name: POSTGRES_PASSWORD
              value: "{{.Values.db.credentials.password}}"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: {{.Release.Name}}-db-pvc
